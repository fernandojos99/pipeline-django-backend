name: Django CI & Deployment

on:
  push:
    branches: [ "fix/docker-deployment-improvements" ]
  pull_request:
    branches: [ "fix/docker-deployment-improvements" ]

jobs:

  tests:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest


  build-and-push:
    runs-on: ubuntu-latest
    needs: tests

    outputs:
      VERSION: ${{ steps.vars.outputs.VERSION }}
      ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract version
        id: vars
        run: echo "VERSION=2.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build, tag and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mi-app-repo
        run: |
          docker build -t $ECR_REPOSITORY:${{ steps.vars.outputs.VERSION }} .
          docker tag $ECR_REPOSITORY:${{ steps.vars.outputs.VERSION }} \
            $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.VERSION }}
          
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.VERSION }}

      - name: Print Image URI
        run: echo "IMAGE URI:${{ steps.login-ecr.outputs.registry }}/mi-app-repo:${{ steps.vars.outputs.VERSION }}"


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          #ECR_REGISTRY="${{ secrets.AWS_ECR_REGISTRY }}"
          script: |
            VERSION="${{ needs.build-and-push.outputs.VERSION }}"
            ECR_REGISTRY="${{ needs.build-and-push.outputs.REGISTRY }}"
            ECR_REPO="mi-app-repo"

            echo "Using VERSION: $VERSION"

            if [ -z "$VERSION" ]; then
              echo "ERROR: VERSION está vacío"
              exit 1
            fi

            echo "Logeando en ECR..."
            aws ecr get-login-password --region us-east-1 | docker login \
            --username AWS --password-stdin 586017285275.dkr.ecr.us-east-1.amazonaws.com

            echo "Deteniendo contenedor anterior..."
            docker stop mi-app-repo || true
            docker rm mi-app-repo || true

            echo "Eliminando imágenes viejas..."
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "^$ECR_REGISTRY" | xargs -r docker rmi

            echo "Descargando nueva imagen..."
            docker pull $ECR_REGISTRY/$ECR_REPO:$VERSION

            echo "Levantando contenedor..."
            docker run -d --name mi-app-repo -p 80:80 $ECR_REGISTRY/$ECR_REPO:$VERSION

            echo "Deploy completado correctamente."
