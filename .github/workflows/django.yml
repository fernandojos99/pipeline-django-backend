name: Django CI

on:
  push:
    branches: [ "fix/docker-deployment-improvements" ]
  pull_request:
    branches: [ "fix/docker-deployment-improvements" ]


jobs:
  tests:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      run: |
        pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: tests   # 👈 asegura que solo corre si 'tests' fue exitoso
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token1 }}

            # 1. Configurar credenciales de AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract version
        id: vars
        run: echo "VERSION=2.0.${{ github.run_number }}" >> $GITHUB_ENV

      # - name: Build Docker image
      #   run: |
      #     REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
      #     docker build -t ghcr.io/${REPO_LOWER}/backend-django:${{ env.VERSION }} .

      # - name: Push Docker image
      #   run: |
      #     REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
      #     docker push ghcr.io/${REPO_LOWER}/backend-django:${{ env.VERSION }}

          
       # 3. Construir y subir la imagen
      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mi-app-repo
          #IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REPOSITORY:${{ env.VERSION }} .
          docker tag $ECR_REPOSITORY:${{ env.VERSION }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.VERSION }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.VERSION }}

      - name: Print Image URI
        run: echo "IMAGE URI:${{ steps.login-ecr.outputs.registry }}/mi-app-repo:${{ env.VERSION }}"
