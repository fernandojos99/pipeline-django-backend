name: Django CI

on:
  push:
    branches: [ "pipelineFer" ]
  pull_request:
    branches: [ "pipelineFer" ]

jobs:
  tests:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      run: |
        pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: tests   # 👈 asegura que solo corre si 'tests' fue exitoso
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token1 }}

      - name: Extract version
        id: vars
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${REPO_LOWER}/backend-django:${{ env.VERSION }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{REPO_LOWER}}/backend-django:${{ env.VERSION }}

