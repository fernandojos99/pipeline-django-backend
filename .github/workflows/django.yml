name: Django CI & Deployment

on:
  push:
    branches: [ "fix/docker-deployment-improvements" ]
  pull_request:
    branches: [ "fix/docker-deployment-improvements" ]

jobs:

  ci-build-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------- TESTS ----------------
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest

      # ---------------- AWS LOGIN ----------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------- VERSION ----------------
      - name: Generate version
        id: vars
        run: echo "VERSION=2.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # ---------------- BUILD & PUSH ----------------
      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mi-app-repo
          VERSION: ${{ steps.vars.outputs.VERSION }}
        run: |
          echo "Building image: $ECR_REPOSITORY:$VERSION"

          docker build -t $ECR_REPOSITORY:$VERSION .
          docker tag $ECR_REPOSITORY:$VERSION $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION

          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION"

          
      # ---------------- DEPLOY ----------------
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          debug: true


              
          script: |
            VERSION="${{ steps.vars.outputs.VERSION }}"
            ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
            ECR_REPO="mi-app-repo"

            echo "Deploying version $VERSION"

            if [ -z "$VERSION" ] || [ -z "$ECR_REGISTRY" ]; then
              echo "ERROR: VERSION o ECR_REGISTRY vacío"
              exit 1
            fi

            echo "Logging into ECR..."
            aws ecr get-login-password --region us-east-1 | docker login \
              --username AWS --password-stdin "$ECR_REGISTRY"

            echo "Stopping old container..."
            docker stop mi-app-repo || true
            docker rm mi-app-repo || true

            echo "Cleaning old images..."
            docker images --format "{{.Repository}}:{{.Tag}}" \
              | grep "^$ECR_REGISTRY" \
              | xargs -r docker rmi || true

            echo "Pulling new image..."
            docker pull "$ECR_REGISTRY/$ECR_REPO:$VERSION"

            echo "Starting container..."
            docker run -d \
              --name mi-app-repo \
              -p 8000:8000 \
              -e LOAD_FIXTURES=false \
              -e DB_NAME='${{ secrets.DB_NAME }}' \
              -e DB_USER='${{ secrets.DB_USER }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e DB_HOST='${{ secrets.DB_HOST }}' \
              -e DB_PORT='${{ secrets.DB_PORT }}' \
              "$ECR_REGISTRY/$ECR_REPO:$VERSION"
              
            echo "Deployment complete."
